<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captured Moments | Wedding Photography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gallery-item { transition: transform 0.3s ease; }
        .gallery-item:hover { transform: scale(1.03); }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans">

    <!-- Navigation -->
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-2xl font-serif tracking-tighter">ELARA PHOTOGRAPHY</h1>
        <div class="space-x-6 text-sm uppercase tracking-widest">
            <a href="#gallery" class="hover:text-stone-500">Gallery</a>
            <a href="#contact" class="hover:text-stone-500">Contact</a>
        </div>
    </nav>

    <!-- Hero -->
    <header class="h-[60vh] flex flex-col justify-center items-center text-center p-6">
        <h2 class="text-5xl md:text-7xl font-serif mb-4">Timeless Weddings</h2>
        <p class="text-stone-600 max-w-lg">Capturing the raw emotion and beauty of your most special day, one frame at a time.</p>
    </header>

    <!-- Gallery -->
    <section id="gallery" class="max-w-6xl mx-auto px-6 py-12">
        <h3 class="text-3xl font-serif mb-8 text-center">Portfolio</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="gallery-item h-80 bg-stone-200 overflow-hidden"><img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Wedding"></div>
            <div class="gallery-item h-80 bg-stone-200 overflow-hidden"><img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Wedding"></div>
            <div class="gallery-item h-80 bg-stone-200 overflow-hidden"><img src="https://images.unsplash.com/photo-1537633552985-df8429e8048b?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Wedding"></div>
            <div class="gallery-item h-80 bg-stone-200 overflow-hidden"><img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Wedding"></div>
            <div class="gallery-item h-80 bg-stone-200 overflow-hidden"><img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Wedding"></div>
            <div class="gallery-item h-80 bg-stone-200 overflow-hidden"><img src="https://images.unsplash.com/photo-1469371670807-013ccf34f16a?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Wedding"></div>
        </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="bg-stone-100 py-20 px-6">
        <div class="max-w-xl mx-auto">
            <h3 class="text-3xl font-serif mb-8 text-center">Book Your Date</h3>
            <form id="contactForm" class="space-y-4">
                <input type="text" placeholder="Your Names" class="w-full p-4 border border-stone-300 bg-white" required>
                <input type="email" placeholder="Email Address" class="w-full p-4 border border-stone-300 bg-white" required>
                <textarea placeholder="Tell me about your big day..." rows="4" class="w-full p-4 border border-stone-300 bg-white" required></textarea>
                <button type="submit" class="w-full bg-stone-800 text-white py-4 hover:bg-stone-700 transition">Send Inquiry</button>
            </form>
            <div id="successMsg" class="hidden mt-4 p-4 bg-green-100 text-green-800 text-center">Thank you! I'll be in touch soon.</div>
        </div>
    </section>

    <footer class="py-12 text-center text-stone-500 text-sm">
        &copy; 2024 Elara Photography. All rights reserved.
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            document.getElementById('contactForm').classList.add('hidden');
            document.getElementById('successMsg').classList.remove('hidden');
        });
    </script>
</body>
</html>
