<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Currency Converter</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
                <input type="number" id="amount" value="1.00" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">From</label>
                    <select id="fromCurrency" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">To</label>
                    <select id="toCurrency" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></select>
                </div>
            </div>

            <button id="convertBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Convert</button>
            
            <div id="result" class="mt-6 p-4 bg-gray-50 rounded-lg text-center hidden">
                <p class="text-gray-600">Result:</p>
                <p id="resultText" class="text-2xl font-bold text-blue-600"></p>
            </div>
        </div>
    </div>

    <script>
        async function init() {
            const res = await fetch('/api/currencies');
            const data = await res.json();
            const fromSelect = document.getElementById('fromCurrency');
            const toSelect = document.getElementById('toCurrency');
            
            data.forEach(curr => {
                fromSelect.innerHTML += `<option value="${curr}">${curr}</option>`;
                toSelect.innerHTML += `<option value="${curr}">${curr}</option>`;
            });
            fromSelect.value = 'USD';
            toSelect.value = 'EUR';
        }

        document.getElementById('convertBtn').addEventListener('click', async () => {
            const amount = document.getElementById('amount').value;
            const from = document.getElementById('fromCurrency').value;
            const to = document.getElementById('toCurrency').value;
            
            const res = await fetch(`/api/convert?amount=${amount}&from_curr=${from}&to=${to}`);
            const data = await res.json();
            
            const resultDiv = document.getElementById('result');
            const resultText = document.getElementById('resultText');
            resultText.innerText = `${data.result.toFixed(2)} ${to}`;
            resultDiv.classList.remove('hidden');
        });

        init();
    </script>
</body>
</html>
