<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZomatoClone | Food Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-red-500 italic">zomato</h1>
            <div class="flex gap-4">
                <button class="text-gray-600 hover:text-red-500">Log in</button>
                <button class="text-gray-600 hover:text-red-500">Sign up</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6">
        <header class="text-center py-12">
            <h2 class="text-4xl font-bold mb-4">Discover the best food & drinks</h2>
            <div class="max-w-xl mx-auto bg-white p-2 rounded-lg shadow-lg flex border border-gray-200">
                <input type="text" placeholder="Search for restaurant or dish" class="flex-1 p-3 outline-none">
                <button class="bg-red-500 text-white px-6 py-3 rounded-md font-semibold">Search</button>
            </div>
        </header>

        <section>
            <h3 class="text-2xl font-semibold mb-6">Popular Restaurants</h3>
            <div id="restaurantGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Data injected by JS -->
            </div>
        </section>
    </main>

    <script>
        const restaurants = [
            { name: "Burger King", cuisine: "Fast Food", rating: 4.2 },
            { name: "Pizza Hut", cuisine: "Italian", rating: 4.5 },
            { name: "Sushi Palace", cuisine: "Japanese", rating: 4.8 }
        ];

        function render() {
            const grid = document.getElementById('restaurantGrid');
            grid.innerHTML = restaurants.map(r => `
                <div class="bg-white rounded-xl overflow-hidden shadow hover:shadow-lg transition cursor-pointer">
                    <div class="h-40 bg-gray-200"></div>
                    <div class="p-4">
                        <div class="flex justify-between items-center">
                            <h4 class="font-bold text-lg">${r.name}</h4>
                            <span class="bg-green-600 text-white text-xs px-2 py-1 rounded">${r.rating} ★</span>
                        </div>
                        <p class="text-gray-500 text-sm">${r.cuisine}</p>
                    </div>
                </div>
            `).join('');
        }
        render();
    </script>
</body>
</html>
