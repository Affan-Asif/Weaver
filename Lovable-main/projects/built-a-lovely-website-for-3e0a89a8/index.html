<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ishrat Siddiqui</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .name {
            color: #764ba2;
            font-size: 1.8em;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .message-container {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
        }

        .love-message {
            font-size: 3em;
            color: #e74c3c;
            font-weight: 700;
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 50px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
        }

        .heart {
            display: inline-block;
            animation: heartBeat 0.6s ease;
        }

        @keyframes heartBeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.3);
            }
            50% {
                transform: scale(1);
            }
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 2em;
            }

            .name {
                font-size: 1.4em;
            }

            .love-message {
                font-size: 2.2em;
            }

            button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ For You ✨</h1>
        <div class="name">Jaaaanu</div>
        
        <div class="message-container" id="messageContainer">
            <div class="love-message" id="loveMessage"></div>
        </div>

        <div class="button-container" id="buttonContainer">
            <button id="startButton">Tell Me How Much You Love Me</button>
        </div>
    </div>

    <script>
        const messageContainer = document.getElementById('messageContainer');
        const loveMessage = document.getElementById('loveMessage');
        const buttonContainer = document.getElementById('buttonContainer');
        const startButton = document.getElementById('startButton');

        let clickCount = 0;

        function showLoveMessage() {
            clickCount++;
            
            // Clear previous message
            loveMessage.textContent = '';
            messageContainer.innerHTML = '';
            
            // Create heart and message
            const heart = document.createElement('span');
            heart.className = 'heart';
            heart.textContent = '❤️ I Love You ❤️';
            
            const message = document.createElement('div');
            message.className = 'love-message';
            message.appendChild(heart);
            
            messageContainer.appendChild(message);
            
            // Create new button
            const newButton = document.createElement('button');
            newButton.textContent = `Tell Me Again (${clickCount})`;
            newButton.onclick = showLoveMessage;
            
            buttonContainer.innerHTML = '';
            buttonContainer.appendChild(newButton);
        }

        startButton.addEventListener('click', showLoveMessage);
    </script>
</body>
</html>
